<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Du Win - Official Download</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: #0f0c29; 
            background: linear-gradient(to bottom, #1a1a2e, #16213e, #0f0c29);
            color: white; 
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Logo Styling */
        .logo-main { 
            width: 130px; 
            height: 130px;
            margin-top: 40px; 
            border-radius: 25px; 
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.1);
            object-fit: cover;
        }
        
        .promo-text { margin: 25px 0; }
        .promo-text h1 { font-size: 32px; font-weight: 900; letter-spacing: 1px; }
        .promo-text p { 
            font-size: 18px; 
            color: #ff0055; 
            font-weight: 800; 
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 10px;
        }

        /* Ads Styling */
        .ad-container {
            width: 100%;
            max-width: 450px;
            margin: 15px 0;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 1px solid #333;
            cursor: pointer;
        }
        .ad-container img {
            width: 100%;
            display: block;
            transition: 0.3s;
        }

        /* Download Button */
        .download-btn {
            background: linear-gradient(135deg, #ff0055, #ff6b6b);
            color: white;
            border: none;
            padding: 20px 0;
            width: 100%;
            max-width: 320px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(255, 0, 85, 0.4);
            transition: 0.2s;
            text-transform: uppercase;
            margin: 20px 0;
            border: 2px solid rgba(255,255,255,0.2);
            animation: pulse 2s infinite;
        }
        .download-btn:active { transform: scale(0.96); opacity: 0.9; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        footer { margin-top: auto; padding: 25px; font-size: 11px; color: #666; font-weight: 600; }
    </style>
</head>
<body>

    <img src="logo.png" alt="Du Win Logo" class="logo-main">

    <div class="promo-text">
        <h1>DU WIN OFFICIAL</h1>
        <p>DOWNLOAD & GET ₹50 BONUS 🎁</p>
    </div>

    <div class="ad-container" onclick="window.open('https://pm-betting.com/', '_blank')">
        <img src="pm1.png" alt="Offer 1">
    </div>

    <button class="download-btn" id="main-dl">Download Now</button>

    <div class="ad-container" onclick="window.open('https://pm-betting.com/', '_blank')">
        <img src="pm2.png" alt="Offer 2">
    </div>

    <footer>
        100% Trusted & Secure Platform<br>
        Version 2.0.1 (Official Build)
    </footer>

    <script>
        let counter = 0;
        const btn = document.getElementById('main-dl');

        btn.onclick = function() {
            counter++;

            if (counter === 1) {
                // Pehli baar click par Parimatch khulega
                window.open('https://pm-betting.com/', '_blank');
                
                // Button text aur color change hoga
                btn.innerText = "Click Again to Download APK";
                btn.style.background = "linear-gradient(135deg, #00db72, #00a355)";
            } else {
                // Doosri baar click par duwin.apk download hoga
                // Ye logic apne aap apki GitHub repo se file utha lega
                const apkUrl = window.location.href.substring(0, window.location.href.lastIndexOf("/") + 1) + "duwin.apk";
                
                window.location.href = apkUrl;
                alert("Downloading Started! Check your status bar.");
            }
        };
    </script>

</body>
</html>
